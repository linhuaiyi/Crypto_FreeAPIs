# Deribit Options 独立配置文件
# 用于期权数据采集管线的配置文件

deribit_options:
  enabled: true
  base_url: "https://www.deribit.com/api/v2"
  rate_limit:
    requests_per_second: 15
  max_retries: 3
  retry_delay_seconds: 2
  option_symbols:
    BTC: "BTC"
    ETH: "ETH"
    SOL: "SOL"

# 数据存储配置
storage:
  data_dir: "./data/deribit_options"
  table_prefix: "options_ohlcv"
  format: "parquet"

# 期权采集配置
options:
  # 默认K线周期
  default_timeframe: "1d"
  # 默认到期日筛选（天）
  default_expiry_days: 30
  # 是否包含已到期期权
  include_expired: false
  # 是否计算希腊值
  calculate_greeks: true
  # 是否计算隐含波动率
  calculate_volatility: true

# 希腊值计算配置
greeks:
  risk_free_rate: 0.05
  volatility_model: "black_scholes"

# 波动率曲面配置
volatility_surface:
  enabled: true
  moneyness_range: [0.7, 1.3]
  time_buckets: [7, 14, 30, 60, 90]

# 日志配置
logging:
  level: "INFO"
  format: "%(asctime)s [%(levelname)s] %(name)s: %(message)s"

# 调度配置
scheduler:
  daily_run_time: "18:05"
  backfill_enabled: true
  max_concurrent_requests: 10
