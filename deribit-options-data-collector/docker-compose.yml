version: "3.8"

services:
  deribit-collector:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: deribit-options-collector
    restart: unless-stopped
    ports:
      - "8080:8080"
      - "9090:9090"
    volumes:
      - ./data:/app/data
      - ./db:/app/db
      - ./config:/app/config:ro
    environment:
      - DERIBIT_API_KEY=${DERIBIT_API_KEY:-}
      - DERIBIT_API_SECRET=${DERIBIT_API_SECRET:-}
      - COLLECTION_CURRENCIES=BTC,ETH
      - COLLECTION_INTERVAL=1
      - SNAPSHOT_CRON=0 8 * * *
      - PARQUET_BASE_PATH=/app/data/raw/option
      - SQLITE_PATH=/app/db/deribit_options.db
      - METRICS_ENABLED=true
      - METRICS_PORT=9090
      - HEALTH_PORT=8080
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - PAGERDUTY_ENABLED=${PAGERDUTY_ENABLED:-false}
      - PAGERDUTY_ROUTING_KEY=${PAGERDUTY_ROUTING_KEY:-}
      - WS_DISCONNECT_THRESHOLD=30
      - WRITE_FAILURE_THRESHOLD=5
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks:
      - monitoring

  prometheus:
    image: prom/prometheus:latest
    container_name: deribit-prometheus
    restart: unless-stopped
    ports:
      - "9091:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'
    networks:
      - monitoring

  grafana:
    image: grafana/grafana:latest
    container_name: deribit-grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
    depends_on:
      - prometheus
    networks:
      - monitoring

networks:
  monitoring:
    driver: bridge

volumes:
  prometheus_data:
  grafana_data:
